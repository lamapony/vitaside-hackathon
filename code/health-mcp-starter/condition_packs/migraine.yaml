# Migraine & headache self-monitoring
id: migraine
name: "Migraine вАФ episodes, meds & triggers"
description: >
  Log headache/migraine days, medications taken, and possible triggers
  from voice notes + wearables for visit prep with neurologist/GP.
disclaimer: >
  Headache pattern tracking only вАФ not a diagnosis of migraine type or
  treatment recommendation.

signals:
  headache:
    keywords: '\b(–Љ–Є–≥—А–µ–љ|–≥–Њ–ї–Њ–≤–љ[–∞-—П]* –±–Њ–ї—М|–±–Њ–ї–Є—В –≥–Њ–ї–Њ–≤–∞|headache|migraine|–њ—Г–ї—М—Б–Є—А—Г[—О–µ]—В|aura|–∞—Гra|—В–Њ—И–љ.*–≥–Њ–ї–Њ–≤|—Б–≤–µ—В.*–≥–ї–∞–Ј.*–±–Њ–ї|phonophob)\b'
    weight: 1.3
  med_triptan:
    keywords: '\b(—Б—Г–Љ–∞—В—А–Є–њ—В–∞–љ|sumatriptan|–Є–Љ–Є—Вrex|imitrex|zomig|—А–µ–їpax|triptan|—В—А–Є–њ—В–∞–љ)\b'
    weight: 1.2
  med_ibuprofen:
    keywords: '\b(–Є–±—Г–њ—А–Њ—Д–µ–љ|ibuprofen|–љ–∞–є–Ј|nurofen|–∞–і–≤–Є–ї|adv|–њ–∞—А–∞—Ж–µ—В–∞–Љ–Њ–ї|paracetamol|aspirin|–∞—Б–њ–Є—А–Є–љ|–Њ–±–µ–Ј–±–Њ–ї)\b'
    weight: 1.0
  med_preventive:
    keywords: '\b(—В–Њ–њ–Є—А–∞–Љ–∞—В|topiramate|propranolol|–њ—А–Њ–њ—А–∞–љ–Њ–ї–Њ–ї|amitriptyline|–∞–Љ–Є—В—А–Є–њ—В–Є–ї–Є–љ|–±–Њ—В–Њ–Ї—Б.*–Љ–Є–≥—А–µ–љ|preventive)\b'
    weight: 1.1
  nausea:
    keywords: '\b(—В–Њ—И–љ[–Њ-—П]| nausea|—А–≤–Њ—В)\b'
    weight: 0.9

track_items:
  - id: headache_episode
    label: "Headache / migraine day"
    signals: [headache, symptom_pain]
  - id: acute_medication
    label: "Acute meds taken"
    signals: [med_triptan, med_ibuprofen]
  - id: preventive_medication
    label: "Preventive meds"
    signals: [med_preventive]
  - id: triggers
    label: "Possible triggers (from notes)"
    signals: [sleep, stress, caffeine_alcohol, sleep_reduced]

metrics:
  - id: episodes_per_month
    label: "Headache/migraine signal days per 30d"
  - id: med_same_day
    label: "Headache days with medication mention same day"
  - id: trigger_lags
    label: "Stress/sleep/caffeine 1вАУ2 days before headache"

doctor_focus:
  - "Frequency of headache days and acute medication use"
  - "Common preceding-day patterns (sleep, stress, caffeine)"
  - "Preventive medication mentions vs episode frequency"
