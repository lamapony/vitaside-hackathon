# Bipolar-relevant self-monitoring (NOT episode diagnosis)
id: bipolar
name: "Bipolar вАФ mood, sleep & rhythm monitoring"
description: >
  Track mood polarity, sleep, energy, irritability, and medication mentions
  for discussion with your psychiatrist. Patterns only вАФ not a diagnostic tool.
disclaimer: >
  Self-monitoring aid for mood and sleep rhythm. Does not detect or label
  manic, hypomanic, or depressive episodes. Share reports with your care team.

signals:
  mood_elevated:
    keywords: '\b(—Н–є—Д–Њ—А|–њ—А–Є–ї–Є–≤ —Б–Є–ї|–љ–µ –Љ–Њ–≥—Г —Г—Б–љ—Г—В—М –Њ—В –Є–і–µ–є|–≥–Є–њ–Њ–Љ–∞–љ|manic|mania|—Б–ї–Є—И–Ї–Њ–Љ –Љ–љ–Њ–≥–Њ —Н–љ–µ—А–≥|–љ–µ –љ—Г–ґ–µ–љ —Б–Њ–љ|grandio|–љ–∞ –≤–Ј–≤–Њ–і–µ|—Б–Ї–∞—З—Г|–±–µ—Б–њ–Њ–Ї–Њ–є–љ.*—Н–љ–µ—А–≥)\b'
    weight: 1.2
  irritability:
    keywords: '\b(—А–∞–Ј–і—А–∞–ґ–Є—В–µ–ї|—Б—А—Л–≤–∞[—О—Б—М]|–Ј–ї—О—Б—М|—П—А–Њ—Б—В—М|irritab|–≤—Б–њ—Л–ї—М—З–Є–≤|–љ–µ—А–≤–љ–Є—З–∞[—О–µ])\b'
    weight: 1.0
  medication_mood:
    keywords: '\b(–ї–Є—В–Є–є|lamotrigine|–ї–∞–Љ–Њ—В—А–Є–і–ґ–Є–љ|valpro|–≤–∞–ї—М–њ—А–Њ|quetiapine|–Ї–≤–µ—В–Є–∞–њ–Є–љ|lithium|–њ—А–Є–љ—П–ї —В–∞–±–ї–µ—В|–≤—Л–њ–Є–ї –ї–µ–Ї–∞—А—Б—В–≤|antidepress|–∞–љ—В–Є–і–µ–њ—А–µ—Б—Б)\b'
    weight: 1.1
  sleep_reduced:
    keywords: '\b(–њ–Њ—З—В–Є –љ–µ —Б–њ–∞–ї –љ–Њ –±–Њ–і—А|3 —З–∞—Б–∞ —Б–љ–∞|–Љ–∞–ї–Њ —Б–њ–∞–ї.*—Н–љ–µ—А–≥|reduced sleep|–Љ–∞–ї–Њ —Б–њ–∞–ї.*–±–Њ–і—А)\b'
    weight: 1.2

track_items:
  - id: mood
    label: "Mood (low / elevated / stable)"
    signals: [mood_low, mood_good, mood_elevated]
  - id: sleep
    label: "Sleep duration & quality"
    signals: [sleep, sleep_reduced]
    apple_metrics: [sleep_hours]
  - id: energy
    label: "Energy & activation"
    signals: [mood_good, mood_elevated, exercise, mood_low]
  - id: irritability
    label: "Irritability"
    signals: [irritability, stress]
  - id: medication
    label: "Medication mentions"
    signals: [medication_mood]

metrics:
  - id: mood_volatility
    label: "Mood polarity changes (7-day windows)"
  - id: reduced_sleep_with_energy
    label: "Reduced sleep + high energy same day (discussion flag)"
  - id: medication_logging
    label: "Days with medication mentions in notes"

doctor_focus:
  - "SleepвАУmood rhythm over the last weeks"
  - "Any weeks with both elevated mood signals and reduced sleep"
  - "Medication adherence mentions in voice notes"
